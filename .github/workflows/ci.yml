name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Coverage (only when tests exist)
        if: ${{ hashFiles('tests/unit/**/*.test.ts') != '' }}
        run: npm run test:unit -- --coverage

      - name: Integration tests
        env:
          VENDOR_SANDBOX_TOKEN: ${{ secrets.VENDOR_SANDBOX_TOKEN }}
        run: |
          if [ -z "${VENDOR_SANDBOX_TOKEN:-}" ]; then
            echo "::notice::No VENDOR_SANDBOX_TOKEN secret — skipping integration tests."
          else
            npm run test:integration
          fi

      - name: npm audit (moderate or higher)
        run: npm audit --audit-level=moderate

      - name: Stdout discipline (no console.log in src/)
        run: |
          set -euo pipefail
          if grep -rnE 'console\.log\(' src/ ; then
            echo "::error::console.log found in src/ — corrupts MCP stdio JSON-RPC framing. Use console.error for diagnostics."
            exit 1
          fi
          echo "OK — no console.log in src/"

      - name: Dead-code check (unused security helpers)
        run: |
          set -euo pipefail
          # Heuristic: every exported validate*/sanitize*/guard*/enforce*/assert*
          # symbol declared in src/ must be referenced from at least one OTHER
          # file in src/. Unreachable defense-in-depth code is a security smell
          # (handbook anti-pattern S1).
          fail=0
          while IFS= read -r decl; do
            [ -z "$decl" ] && continue
            file=${decl%%:*}
            line=${decl#*:}
            name=$(echo "$line" | grep -oE '(validate|sanitize|guard|enforce|assert)[A-Z][A-Za-z0-9_]*' | head -1)
            [ -z "$name" ] && continue
            uses=$(grep -rEln "\\b$name\\b" src/ | grep -v "^$file$" | wc -l | tr -d ' ')
            if [ "$uses" -eq 0 ]; then
              echo "::error file=$file::Exported security helper '$name' is not imported from any other file in src/ — dead code is a security smell (handbook anti-pattern S1)."
              fail=1
            fi
          done < <(grep -rnE '^export (function|const|class) (validate|sanitize|guard|enforce|assert)[A-Z]' src/ || true)
          if [ "$fail" -eq 0 ]; then
            echo "OK — no dead security helpers."
          fi
          exit "$fail"

      - name: README env-var accuracy
        run: |
          set -euo pipefail
          # Every env var documented in README.md's "## Environment variables"
          # section must be referenced in src/ via process.env.X. Mismatches
          # fail the build (handbook anti-pattern S2: env vars documented but
          # not wired).
          # Skip placeholder tokens containing '<' (e.g. <VENDOR>_API_KEY) and
          # short common acronyms.
          if [ ! -f README.md ]; then
            echo "::warning::No README.md — skipping env-var accuracy check."
            exit 0
          fi
          section=$(awk '
            /^## Environment variables/  { in_section=1; next }
            /^## /                       { in_section=0 }
            in_section                   { print }
          ' README.md)
          if [ -z "$section" ]; then
            echo "::notice::No '## Environment variables' section in README.md — skipping env-var accuracy check."
            exit 0
          fi
          fail=0
          # Extract `BACKTICK_QUOTED_UPPERCASE_TOKENS`, drop placeholders + acronyms.
          vars=$(echo "$section" \
            | grep -oE '`[A-Z][A-Z0-9_]+`' \
            | tr -d '`' \
            | sort -u \
            | grep -vE '^(MCP|API|URL|HTTP|HTTPS|JSON|UUID|SDK|MIT|CI|PR|README|TLS|SSL|UTC|UTF8|HTML|REST|RPC|YAML|TOML|XML|RFC|JS|TS)$' \
            || true)
          for var in $vars; do
            # Skip placeholder-shaped names from the same section
            if echo "$section" | grep -qE "<[^>]*>${var}|${var}[^<]*<[^>]*>"; then
              continue
            fi
            if ! grep -rqE "process\\.env\\.${var}\\b" src/ ; then
              echo "::error::Env var '${var}' is documented in README.md '## Environment variables' but not referenced in src/ via process.env.${var} (handbook anti-pattern S2)."
              fail=1
            fi
          done
          if [ "$fail" -eq 0 ]; then
            echo "OK — README env-var documentation matches src/."
          fi
          exit "$fail"

      - name: Confirmation-token enforcement (handbook ADR 0004 Track 1)
        run: |
          set -euo pipefail
          # Every tool annotated `category: "write_irreversible"` MUST:
          #   1. Declare confirmation_token somewhere in its source
          #      (typically inputSchema.properties).
          #   2. Import or reference consumeConfirmation in its handler.
          # Removing or relaxing this check requires a successor ADR
          # superseding handbook ADR 0004.
          # Reference implementation: juvantlabs/m365-graph-mcp-server
          # v0.1.4+ (delete_file, cancel_event, decline_event tools).
          fail=0
          while IFS= read -r match; do
            [ -z "$match" ] && continue
            file=${match%%:*}
            if ! grep -qE 'confirmation_token' "$file"; then
              echo "::error file=$file::Tool annotated category=\"write_irreversible\" but source does not reference confirmation_token (handbook ADR 0004 Track 1)."
              fail=1
            fi
            if ! grep -qE 'consumeConfirmation' "$file"; then
              echo "::error file=$file::Tool annotated category=\"write_irreversible\" but source does not reference consumeConfirmation (handbook ADR 0004 Track 1)."
              fail=1
            fi
          done < <(grep -rEln 'category:\s*"write_irreversible"' src/tools/ 2>/dev/null || true)
          if [ "$fail" -eq 0 ]; then
            echo "OK — every write_irreversible tool gates via confirmation_token + consumeConfirmation."
          fi
          exit "$fail"

      - name: v0.3 send-gate invariant (docs/adr/0001-v0-3-send-gate-contract.md D8)
        run: |
          set -euo pipefail
          # v0.1 ships NO send capability. ADR 0001 D8 pins that when
          # `send_draft` lands in v0.3, it MUST be gated by a
          # confirmation_token consumed in the same session.
          #
          # This check fails the build if any tool under src/tools/
          # references a Graph send-form endpoint
          #   /sendMail, /send, /reply, /replyAll, /forward
          # (the trailing-form endpoints, distinct from createReply /
          # createReplyAll / createForward which produce drafts) without
          # ALSO importing consumeConfirmation from the confirmation-
          # token infra. The v0.1 baseline: zero such references.
          send_endpoint_pattern='/sendMail|/send["'\'']|/messages/[^/]*/send["'\'']|/reply["'\'']|/replyAll["'\'']|/forward["'\'']'
          fail=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if ! grep -qE 'consumeConfirmation' "$file"; then
              echo "::error file=$file::Tool references a Graph send-form endpoint but does not import consumeConfirmation. Per ADR 0001 D8, any send path MUST be gated by a consumed confirmation-token from the same session. If this is intentional (post-v0.3), add the consumeConfirmation gate; otherwise revert."
              fail=1
            fi
          done < <(grep -rEln "$send_endpoint_pattern" src/tools/ 2>/dev/null || true)
          if [ "$fail" -eq 0 ]; then
            echo "OK — no ungated send-form endpoint references in src/tools/."
          fi
          exit "$fail"

      - name: Shield C4 — agent-draft marker invariant
        run: |
          set -euo pipefail
          # Shield C4 requires every draft this server creates to
          # carry the '[agent-draft] ' subject prefix and/or the
          # X-Juvant-Agent-Author header. Structural check: the two
          # load-bearing constants MUST live in src/tools/_shared.ts.
          # If either is renamed or removed without a successor ADR,
          # fail the build so it surfaces in code review.
          fail=0
          if ! grep -qE 'AGENT_DRAFT_SUBJECT_PREFIX\s*=\s*"\[agent-draft\] "' src/tools/_shared.ts; then
            echo "::error file=src/tools/_shared.ts::Shield C4 constant AGENT_DRAFT_SUBJECT_PREFIX is missing or has drifted from '[agent-draft] '. Requires a successor ADR."
            fail=1
          fi
          if ! grep -qE 'AGENT_DRAFT_HEADER_NAME\s*=\s*"X-Juvant-Agent-Author"' src/tools/_shared.ts; then
            echo "::error file=src/tools/_shared.ts::Shield C4 constant AGENT_DRAFT_HEADER_NAME is missing or has drifted from 'X-Juvant-Agent-Author'. Requires a successor ADR."
            fail=1
          fi
          if [ "$fail" -eq 0 ]; then
            echo "OK — Shield C4 constants present."
          fi
          exit "$fail"
