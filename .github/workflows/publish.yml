name: Publish

on:
  push:
    tags: ['v*.*.*']

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Manual approval gate. Configure the 'production' environment in the
    # repo settings (Settings → Environments) to require reviewer approval
    # before the npm publish step runs. Without this gate, a compromised
    # tag pushes straight to npm.
    environment:
      name: production
      url: https://www.npmjs.com/package/${{ github.event.repository.name }}
    permissions:
      contents: read
      # id-token: write enables both:
      #   - npm provenance attestation (signature on the published tarball)
      #   - npm Trusted Publishing (OIDC-based auth — no NPM_TOKEN needed)
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'

      # npm 10 (bundled with Node 20) signs provenance via OIDC but does
      # NOT use OIDC for the actual publish auth — npm 10 still requires
      # a token in NODE_AUTH_TOKEN. Trusted Publishing's OIDC publish flow
      # needs npm ≥ 11.5.1. Upgrading explicitly here so this workflow
      # doesn't inherit npm's version from whichever Node LTS is current.
      # See: https://docs.npmjs.com/trusted-publishers
      - name: Upgrade npm (Trusted Publishing requires ≥ 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: npm audit (moderate or higher)
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Publish to npm (token bootstrap + provenance)
        # TEMPORARY — first-publish bootstrap.
        #
        # npm Trusted Publishing (OIDC-based publish auth) CANNOT be
        # pre-registered for a package that does not yet exist on
        # npmjs.com — the "Add Trusted Publisher" UI requires the
        # package to be resolvable first. So v0.1.0's first publish
        # must authenticate with a Granular Access Token via
        # NODE_AUTH_TOKEN. Once v0.1.0 is live, we register the
        # trusted publisher on npmjs.com and PR B removes this env
        # block, reverting to pure OIDC.
        #
        # Note: `--provenance` still works via OIDC independently of
        # publish auth — `id-token: write` above signs the attestation
        # regardless of which auth mechanism carries the publish PUT.
        #
        # This mirrors the sibling m365-graph-mcp-server's v0.1.0 →
        # v0.1.3 migration: v0.1.0 shipped with NODE_AUTH_TOKEN;
        # v0.1.2 attempted the OIDC migration (failed on npm 10);
        # v0.1.3 landed OIDC + `npm install -g npm@latest` (kept
        # above so the future PR B is a pure env-block deletion).
        #
        # Trusted Publisher config to apply on npmjs.com after
        # v0.1.0 is live:
        #   Publisher: GitHub Actions
        #   Org/User:  juvantlabs
        #   Repo:      m365-mail-mcp-server
        #   Workflow:  publish.yml
        #   Env:       production
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access=public --provenance
