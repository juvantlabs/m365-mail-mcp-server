name: Publish

on:
  push:
    tags: ['v*.*.*']

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Manual approval gate. Configure the 'production' environment in the
    # repo settings (Settings → Environments) to require reviewer approval
    # before the npm publish step runs. Without this gate, a compromised
    # tag pushes straight to npm.
    environment:
      name: production
      url: https://www.npmjs.com/package/${{ github.event.repository.name }}
    permissions:
      contents: read
      # id-token: write enables both:
      #   - npm provenance attestation (signature on the published tarball)
      #   - npm Trusted Publishing (OIDC-based auth — no NPM_TOKEN needed)
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'

      # npm 10 (bundled with Node 20) signs provenance via OIDC but does
      # NOT use OIDC for the actual publish auth — npm 10 still requires
      # a token in NODE_AUTH_TOKEN. Trusted Publishing's OIDC publish flow
      # needs npm ≥ 11.5.1. Upgrading explicitly here so this workflow
      # doesn't inherit npm's version from whichever Node LTS is current.
      # See: https://docs.npmjs.com/trusted-publishers
      - name: Upgrade npm (Trusted Publishing requires ≥ 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: npm audit (moderate or higher)
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Publish to npm (Trusted Publishing + provenance)
        # No NODE_AUTH_TOKEN. Authentication is via OIDC: npm verifies
        # the GitHub Actions OIDC token's claims (repo, workflow,
        # environment) match the trusted publisher registered for this
        # package on npmjs.com. Migrated from a first-publish granular
        # access token (NPM_TOKEN) to Trusted Publishing after v0.1.0
        # was live on npmjs.com — the "Add Trusted Publisher" UI
        # requires the package to be resolvable first, so v0.1.0 shipped
        # via NODE_AUTH_TOKEN bootstrap and all subsequent releases run
        # OIDC-only. Trusted Publisher registered on npmjs.com:
        #   Publisher: GitHub Actions
        #   Org/User:  juvantlabs
        #   Repo:      m365-mail-mcp-server
        #   Workflow:  publish.yml
        #   Env:       production
        #   Permission: npm publish
        # No static secret to rotate; scope tied to this exact
        # (repo, workflow, environment) tuple.
        run: npm publish --access=public --provenance
